name: Ticket Monitor

on:
  schedule:
    # PRIMARY cadence comes from an EXTERNAL cron that pings this workflow every
    # 60s (GitHub's own scheduler can't fire faster than ~5 min and is delayed
    # under load). This built-in */5 schedule is just a backstop so coverage
    # degrades to ~5-min if the external pinger ever dies.
    - cron: "*/5 * * * *"

  # The external every-60s cronjob triggers a run via GitHub's API. Support both
  # dispatch endpoints so it works however the cronjob is configured:
  #   • repository_dispatch — POST /repos/<owner>/<repo>/dispatches
  #       body: {"event_type":"poll"}   (no `types:` filter = accept any type)
  #   • workflow_dispatch    — POST /repos/<owner>/<repo>/actions/workflows/monitor.yml/dispatches
  #       body: {"ref":"main"}
  # Either way send headers: Authorization: Bearer <PAT with actions:write>,
  # Accept: application/vnd.github+json. The workflow file must already be on main.
  repository_dispatch:

  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (check sites, send no alerts)"
        type: boolean
        default: false
      probe_movie:
        description: "Probe: send a real test alert for a movie on sale NOW (e.g. Masters of the Universe). Leave blank for a normal run."
        type: string
        default: ""
      test_pushover:
        description: "Send a test Pushover emergency alert and exit"
        type: boolean
        default: false
      test_escalation:
        description: "Send the exact 'Dune new showtime on sale' siren and exit"
        type: boolean
        default: false
      test_email:
        description: "Print what the Dune Insider Gmail watch matches now, and exit (sends nothing)"
        type: boolean
        default: false
      discover_amc:
        description: "Print AMC API theatre id + sample showtimes and exit"
        type: boolean
        default: false

# DON'T cancel-in-progress here: a job's total wall-time (checkout + setup +
# pip + the ≤55s poll + state commit) exceeds the 60s ping interval, so
# cancelling the running job on each new ping would mean NO run ever finishes or
# commits. Instead rely on GitHub's queue semantics for a concurrency group:
# at most one run in-progress + one pending, and a newer ping supersedes the
# older pending one. So the current run always completes and commits, and the
# freshest ping is always queued next — that's the "next one clears" behaviour,
# safely. The ≤55s poll timeout keeps any single run from bleeding over.
concurrency:
  group: ticket-monitor
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run monitor
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          APIFY_TOKEN_2: ${{ secrets.APIFY_TOKEN_2 }}
          APIFY_TOKEN_3: ${{ secrets.APIFY_TOKEN_3 }}
          PUSHOVER_TOKEN: ${{ secrets.PUSHOVER_TOKEN }}
          PUSHOVER_USER: ${{ secrets.PUSHOVER_USER }}
          AMC_VENDOR_KEY: ${{ secrets.AMC_VENDOR_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          if [ "${{ inputs.discover_amc }}" = "true" ]; then
            python src/main.py --discover-amc
          elif [ "${{ inputs.test_pushover }}" = "true" ]; then
            python src/main.py --test-pushover
          elif [ "${{ inputs.test_escalation }}" = "true" ]; then
            python src/main.py --test-escalation
          elif [ "${{ inputs.test_email }}" = "true" ]; then
            python src/main.py --test-email
          elif [ -n "${{ inputs.probe_movie }}" ]; then
            python src/main.py --probe "${{ inputs.probe_movie }}"
          elif [ "${{ inputs.dry_run }}" = "true" ]; then
            python src/main.py --dry-run
          else
            # An external cron pings this workflow every 60s, so each run is a
            # SINGLE poll. Hard-cap the poll at 55s (< the 1-min ping) so a hung
            # check (slow AMC/IMAP) is killed with headroom and can't bleed into
            # the next minute — the next ping just starts a clean run. `timeout`
            # exits 124 when it kills the process; swallow it (and any error) so
            # one slow/failed poll doesn't red-fail the job.
            timeout 55 python src/main.py || echo "poll timed out/errored — next ping clears it"
          fi

      # Persist state by committing it back. Runs can land close together, so a
      # plain push gets rejected (non-fast-forward) — which previously both
      # failed the run AND dropped state (causing duplicate alerts). Instead:
      # reset to the latest remote, MERGE this run's state in, push, and retry.
      # Never fail the run over this — the next run reconciles via the merge.
      - name: Commit updated state
        if: ${{ github.event_name == 'schedule' || inputs.dry_run != true }}
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          cp state/seen.json /tmp/our_state.json
          for i in 1 2 3 4 5; do
            git fetch -q origin main
            git reset -q --hard origin/main
            python3 scripts/merge_state.py /tmp/our_state.json
            git add state/seen.json
            if git diff --cached --quiet; then
              echo "No state changes to commit."; exit 0
            fi
            git commit -q -m "update state [skip ci]"
            if git push -q origin HEAD:main; then
              echo "State pushed (attempt $i)."; exit 0
            fi
            echo "Push race; retrying ($i)..."; sleep 2
          done
          echo "WARN: could not persist state after retries; next run reconciles."
          exit 0

      # Telegram ping if ANY step above failed (a crash, or the pip install
      # breaking) — so an infrastructure-level failure isn't silent.
      # App-level problems (AMC unreachable / layout changed) are alerted from
      # within the monitor itself; this is the catch-all backstop.
      - name: Notify on failure
        if: failure()
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            --data-urlencode chat_id="${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=⚠️ ticket-monitor run FAILED (infrastructure/step error). Logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            >/dev/null || true
