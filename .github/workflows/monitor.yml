name: Ticket Monitor

on:
  schedule:
    # Every 30 minutes. GitHub's scheduler is best-effort and often delays
    # runs by several minutes under load, so going lower than this buys little
    # and risks getting the runner IP bot-blocked by AMC/Fandango faster.
    - cron: "*/30 * * * *"

  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (check sites, send no alerts)"
        type: boolean
        default: false
      probe_movie:
        description: "Probe: send a real test alert for a movie on sale NOW (e.g. Masters of the Universe). Leave blank for a normal run."
        type: string
        default: ""

# Avoid overlapping runs stepping on the committed state file.
concurrency:
  group: ticket-monitor
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Cache the downloaded Chromium so 5-min runs don't re-download it (~120MB).
      - name: Cache Playwright browser
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}

      - name: Install Playwright browser
        run: |
          if [ "${{ steps.pw-cache.outputs.cache-hit }}" = "true" ]; then
            python -m playwright install chromium        # binary cached; skip download
          else
            python -m playwright install --with-deps chromium
          fi

      - name: Run monitor
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
        run: |
          if [ -n "${{ inputs.probe_movie }}" ]; then
            python src/main.py --probe "${{ inputs.probe_movie }}"
          elif [ "${{ inputs.dry_run }}" = "true" ]; then
            python src/main.py --dry-run
          else
            python src/main.py
          fi

      - name: Commit updated state
        if: ${{ github.event_name == 'schedule' || inputs.dry_run != true }}
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add state/seen.json
          if git diff --cached --quiet; then
            echo "No state changes to commit."
          else
            git commit -m "update state [skip ci]"
            git push
          fi
